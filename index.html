h1 { margin-top:20px; transition: color 0.5s;}
#themeSelector { margin:10px; padding:5px; font-size:16px;}
#status { display:flex; justify-content:center; gap:20px; margin:20px; transition: background 0.5s; flex-wrap:wrap;}

/* --- Boxen zentriert --- */
.box {
display: flex;
justify-content: center;
align-items: center;
text-align: center;
padding:10px 20px;
border-radius:12px;
font-weight:bold;
font-size:18px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
transition:all 0.5s;
}

#wort {
  font-size:32px;
  margin:20px;
  font-weight:bold;
  text-align:center;

  display: block;   /* 👉 KEIN flex mehr */
}
/* --- Antwortbuttons 2x2, größere Größe, zentriert --- */
#antworten {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: nowrap;   /* 👉 bricht um, falls nötig */
  margin: 20px auto;
}

#antworten button {
  min-width: 150px;
  padding: 15px 20px;
  font-size: 24px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
}


#antworten button:hover { transform:scale(1.05); }

#feedback { font-size:24px; margin-top:15px; height:30px; transition:all 0.3s;}
#timerBarContainer, #progressContainer { width:60%; height:20px; border-radius:10px; margin:10px auto; overflow:hidden; background:#ccc; transition:all 0.5s;}
#timerBar, #progressBar { height:100%; width:100%; transition: width 0.1s linear;}
#leben { font-size:24px; margin:10px; }

/* Top 3 Farben */
.gold {
  color: #FFD700;
  font-weight: bold;
}

.silver {
  color: #C0C0C0;
  font-weight: bold;
}

.bronze {
  color: #cd7f32;
  font-weight: bold;
}

/* Dein eigener Score */
.me {
  background: rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 2px 6px;
}

/* --- NEU: Layout nebeneinander --- */
#gameWrapper {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 0px;
  margin-top: 20px;
position: relative; 
}

#gameArea {
  display: flex;
  flex-direction: column;
  align-items: center;

}

#highscoresContainer {
  position: fixed;   /* 👈 statt absolute */
  right: 20px;
  top: 40px;         /* 👈 frei einstellbar */
  z-index: 999;
}

.highscoreBox {
  position: sticky;
  top: 20px;   /* 👈 deutlich weiter oben */
}

/* --- Wort-Highlight sauber zentriert --- */
.wort-box {
  background: linear-gradient(135deg, #ff9800, #ff5722);
  color: white;

  padding: 15px 25px;
  border-radius: 15px;

  font-size: 36px;   /* 👉 kleiner */
  font-weight: bold;

  box-shadow: 0 6px 15px rgba(0,0,0,0.25);

  display: block;            /* 👉 GANZE ZEILE */
  width: fit-content;        /* 👉 Größe nur so groß wie Inhalt */
  margin: 0 auto 20px auto;  /* 👉 perfekt zentriert */

  letter-spacing: 1px;
}


/* --- ZENTRIERUNG DES SPIELS --- */
#mainCenter {
  max-width: 900px;     /* 👉 schöne Spielbreite */
  margin: 0 auto;       /* 👉 horizontal zentriert */
  text-align: center;
}
#timerBarContainer,
#progressContainer {
  display: none;
}
/* --- Artikel-Farben --- */
.btn-der {
  background: #448aff;   /* blau */
  color: white;
}

.btn-die {
  background: #f44336;   /* rot */
  color: white;
}

.btn-das {
  background: #ffeb3b;   /* gelb */
  color: black;
}

.btn-special {
  background: #9e9e9e;   /* grau */
  color: white;
}

#footer {
  position: fixed;
  bottom: 10px;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.7;
  pointer-events: none;
}

/* 👉 JETZT AUSSERHALB */
.box span {
  margin-left: 8px;
}

.box {
  gap: 8px;
}

/* --- STARTSCREEN VERBESSERN --- */
#startScreen {
  margin-top: 60px;
}

#startScreen label {
  display: block;
  font-size: 22px;
  margin: 20px 0 10px 0;
}

#startScreen input,
#startScreen select {
  font-size: 20px;
  padding: 10px 15px;
  border-radius: 10px;
  margin-top: 8px;
  width: 260px;
}

#startScreen button {
  margin-top: 30px;
  font-size: 24px;
  padding: 15px 30px;
  border-radius: 12px;
  cursor: pointer;
  background: #4caf50;
  color: white;
  border: none;
  transition: 0.3s;
}

#startScreen button:hover {
  transform: scale(1.05);
}
#startScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
}
/* --- Highscore einzelne Boxen --- */
.highscore-item {
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 12px;

  text-align: center;

  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(6px);

  transition: 0.3s;
  border: 2px solid black;

}

.highscore-item:hover {
  transform: scale(1.05);
}

/* Top 3 stärker hervorheben */
.highscore-item.gold {
  background: linear-gradient(135deg, #FFD700, #ffb300);
  color: #000;
}

.highscore-item.silver {
  background: linear-gradient(135deg, #C0C0C0, #9e9e9e);
  color: #000;
}

.highscore-item.bronze {
  background: linear-gradient(135deg, #cd7f32, #a05a2c);
  color: #fff;
}
.highscore-item {
  text-align: center;   /* 👈 zentriert Text */
}
.highscore-item strong {
  display: block;
  margin-top: 5px;
  font-size: 18px;
}
@keyframes slideInRight {
  from {
    transform: translateX(80px);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

.highscoreBox {
  animation: slideInRight 0.6s ease;
}
.highscore-item.me {
  border: 2px solid #00e5ff;
  box-shadow: 0 0 15px #00e5ff;
}
/* --- Medaillen als Kreise --- */
.medal-circle {
  display: inline-flex;
  justify-content: center;
  align-items: center;

  width: 32px;
  height: 32px;

  border-radius: 50%;
  background: white;
  color: black;

  font-size: 16px;
  font-weight: bold;

  box-shadow: 0 3px 6px rgba(0,0,0,0.3);

  justify-self: start; /* 👈 bleibt drin */
}
/* --- Highscore Zeile korrekt ausrichten --- */
.highscore-row {
  display: grid;
  grid-template-columns: 40px 1fr;
  align-items: center;
}

.highscore-name {
  text-align: left;
}
.highscore-item {
  text-align: left;
}
.highscore-points {
  text-align: center;
  width: 100%;
  font-weight: bold;
  margin-top: 6px;
}
.highscore-name {
  white-space: nowrap;
}
.wort-box small {
  font-size: 14px;
  opacity: 0.6;
  background: rgba(255,255,255,0.2);
  padding: 3px 8px;
  border-radius: 8px;
  display: inline-block;
  margin-top: 8px;
}
.hsk-label {
  font-size: 14px;
  padding: 4px 10px;
  border-radius: 10px;
  display: inline-block;
  margin-top: 8px;
  color: white;
  font-weight: bold;
}

.hsk3 { background: #ffc107; color: black; } /* gelb */

.highscore-title {

 text-transform: uppercase;

.night .highscoreBox {
  background: rgba(50,50,100,0.25);

// --- Spielvariablen ---
let punkte=0, aktuelleFrage=0, zeit=10, timerID, leben=3, playerName="";
let selectedHSK = "all";
let gefilterteListe = [];
let combo = 0;
let gesamtSpielZeit=60, gesamtSekunden=0, gesamtTimerID;

// --- Highscore ---
function getHighscores(){ return JSON.parse(localStorage.getItem("vokabelHighscores_level2")||"[]"); }
function saveHighscores(hs){ localStorage.setItem("vokabelHighscores_level2",JSON.stringify(hs)); }


function updateAllHighscores(){
  let hs = getHighscores();
  hs.sort((a,b)=>b.punkte-a.punkte);

  let html = "<div class='highscore-title'>🏆 Highscore</div>";

  hs.slice(0,10).forEach((e,i)=>{
    let klasse = "";

    if(i === 0) klasse = "gold";
    else if(i === 1) klasse = "silver";
    else if(i === 2) klasse = "bronze";

    if(e.name === playerName) klasse += " me";

    let medal = ["🥇","🥈","🥉"][i] || "";

    let medalHTML = "";
    if(i < 3){
      medalHTML = `<div class="medal-circle">${medal}</div>`;
    }

    html += `
      <div class="highscore-item ${klasse}">
        
        <div class="highscore-row">
          ${medalHTML}
          <div class="highscore-name">${i+1}. ${e.name}</div>
        </div>

        <div class="highscore-points">${e.punkte} Punkte</div>

      </div>
    `;
  });

  document.getElementById("highscoreList2").innerHTML = html;
}

// --- Popups ---
function showTop10Popup(name,punkte,rang){
  const popup=document.getElementById("top10Popup");
  popup.innerHTML=`🎉 Glückwunsch ${name}! <br> Rang ${rang} in den Top 10! <br> Punkte: ${punkte}`;
  popup.style.display="block";
  setTimeout(()=>{popup.style.display="none";},4000);
}

// --- Start ---
document.getElementById("startBtn").onclick=function(){
document.getElementById("gameTitle").innerText = "Vokabelspiel MA 🎮";
document.getElementById("highscoresContainer").style.display = "block";
document.getElementById("timerBarContainer").style.display = "block";
document.getElementById("progressContainer").style.display = "block";

  playerName=document.getElementById("playerName").value.trim()||"Spieler";
selectedHSK = document.getElementById("hskSelector").value;

if(selectedHSK === "all"){
  gefilterteListe = [...level2];
} else {
  gefilterteListe = level2.filter(e => e[0] === selectedHSK);
}

shuffleArray(gefilterteListe);
  gesamtSpielZeit=parseInt(document.getElementById("timeSelector").value);
  document.getElementById("startScreen").style.display="none";
  document.getElementById("status").style.display="flex";
  updateLebenAnzeige(); updateAllHighscores(); startGesamtTimer(); starteFrage();
}

// --- Timer ---
function updateTimerBar(){document.getElementById("timerBar").style.width=(zeit/10*100)+"%";}
function startTimer(){ clearInterval(timerID); zeit=10; updateTimerBar();
  timerID=setInterval(()=>{
    zeit-=0.1;
    if(zeit<0) zeit=0;
    updateTimerBar();
    if(zeit===0){ clearInterval(timerID); zeitAbgelaufen(); }
  },100);
}

// --- Popups und Antworten ---


function zeitAbgelaufen(){
combo = 0;
const w = gefilterteListe[aktuelleFrage];const correct = w[1] + " (" + w[2] + ")";


  document.getElementById("overlay").style.display="block";
  const popup=document.getElementById("timeOverPopup");
  popup.innerHTML=`⏰ Zeit abgelaufen!<br>Richtige Antwort: <span class="correct-answer-highlight">${correct}</span>`;
  popup.style.display="block";
 setTimeout(()=>{
  document.getElementById("overlay").style.display="none";
  popup.style.display="none";

  // ❗ KEIN zweites Popup mehr
  leben--;
  updateLebenAnzeige();

  if(leben <= 0){
    spielZurücksetzen();
  } else {
    nächsteFrage();
  }

},4000);
}

document.getElementById("richtig").volume=0.3;
document.getElementById("falsch").volume=0.3;

function updateLebenAnzeige(){ let str=""; for(let i=0;i<leben;i++) str+="❤️"; document.getElementById("leben").innerHTML=str; }

function startGesamtTimer(){ clearInterval(gesamtTimerID); gesamtSekunden=0; document.getElementById("gesamtzeit").innerText=gesamtSekunden;
  gesamtTimerID=setInterval(()=>{
    gesamtSekunden++; document.getElementById("gesamtzeit").innerText=gesamtSekunden;
    if(gesamtSekunden>=gesamtSpielZeit){ clearInterval(gesamtTimerID);
      document.getElementById("overlay").style.display="block";
      const popup=document.getElementById("timeOverPopup");
      popup.innerHTML=`⏰ Gesamtzeit abgelaufen!<br>Punkte: ${punkte}`;
      popup.style.display="block";
      setTimeout(()=>{
        document.getElementById("overlay").style.display="none";
        popup.style.display="none";
        addHighscore(playerName,punkte);
        punkte=0; aktuelleFrage=0; leben=3; document.getElementById("punkte").innerText=0; document.getElementById("gesamtzeit").innerText=0; updateLebenAnzeige(); startGesamtTimer(); starteFrage();
      },4000);
    }
  },1000);
}

// --- Highscore Funktionen ---
function addHighscore(name,punkte){
  let hs=getHighscores();
  hs.push({name,punkte}); hs.sort((a,b)=>b.punkte-a.punkte);
  if(hs.length>10) hs=hs.slice(0,10);
  saveHighscores(hs); updateAllHighscores();
  let rang=hs.findIndex(e=>e.name===name && e.punkte===punkte)+1;
  if(rang>0 && rang<=10) showTop10Popup(name,punkte,rang);
}

function getPunkte(level){
  switch(level){
    case "HSK1": return 1;
    case "HSK2": return 2;
    case "HSK3": return 3;
    case "HSK4": return 4;
    case "HSK5": return 5;
    default: return 1;
  }
}

// --- Spiel zurücksetzen ---
function spielZurücksetzen(){ clearInterval(gesamtTimerID); alert("Keine Leben mehr! Spiel wird zurückgesetzt."); addHighscore(playerName,punkte); punkte=0; aktuelleFrage=0; leben=3; document.getElementById("punkte").innerText=punkte; document.getElementById("gesamtzeit").innerText=0; updateLebenAnzeige(); startGesamtTimer(); starteFrage(); }

// --- Frage ---
function starteFrage(){
  clearInterval(timerID);
  document.getElementById("feedback").innerText="";
  document.getElementById("antworten").innerHTML="";
  updateProgress();

if(aktuelleFrage>=gefilterteListe.length) aktuelleFrage=0;
const w = gefilterteListe[aktuelleFrage];

  // 👉 Spanisches Verb anzeigen
let hskClass = w[0].toLowerCase(); // hsk1, hsk2 ...

document.getElementById("wort").innerHTML = `
  <div class="wort-box">
    ${w[3]} <br>
    <span class="hsk-label ${hskClass}">${w[0]}</span>
  </div>
`;

  // 👉 Richtige + falsche Antworten erzeugen
let korrekt = w[1] + " (" + w[2] + ")";
let antworten = [korrekt];

while(antworten.length < 4){
let rand = gefilterteListe[Math.floor(Math.random()*gefilterteListe.length)];  let falsch = rand[1] + " (" + rand[2] + ")";
  if(!antworten.includes(falsch)) antworten.push(falsch);
}

  shuffleArray(antworten);

  antworten.forEach(a=>{
    const btn = document.createElement("button");
    btn.innerText = a;

btn.onclick = ()=>checkAntwort(a, korrekt);
document.getElementById("antworten").appendChild(btn);
  });

  startTimer();
}



// --- Antwort prüfen ---
function checkAntwort(eingabe,richtig){ clearInterval(timerID); if(eingabe===richtig) richtigAntwort(); else falschAntwort(richtig);}

function richtigAntwort(){
  combo++;

  let w = gefilterteListe[aktuelleFrage];
  let level = w[0];

  let punktePlus = getPunkte(level);

  if(combo >= 3){
    punktePlus += combo;
    document.getElementById("feedback").innerText = "🔥 Combo x" + combo;
  } else {
    document.getElementById("feedback").innerText = "Richtig! 🎉";
  }

  document.getElementById("richtig").currentTime=0;
  document.getElementById("richtig").play();

  punkte += punktePlus;
  document.getElementById("punkte").innerText = punkte;

  nächsteFrage();
}


function falschAntwort(richtig){
combo = 0;
  leben--; updateLebenAnzeige(); 
  const popup=document.getElementById("timeOverPopup");
  document.getElementById("overlay").style.display="block";

popup.innerHTML=`
<div class="error-icon">✖</div>
<span class="correct-answer-highlight">${richtig}</span>
`;

popup.style.display="block";
  document.getElementById("falsch").currentTime=0; document.getElementById("falsch").play();
  setTimeout(()=>{
    document.getElementById("overlay").style.display="none"; popup.style.display="none";
    if(leben<=0) spielZurücksetzen(); else nächsteFrage();
  },4000);
}



function nächsteFrage(){aktuelleFrage++; starteFrage();}
function updateProgress(){
  const pr = ((aktuelleFrage+1)/gefilterteListe.length)*100;
document.getElementById("progressBar").style.width=pr+"%";}
</script>
